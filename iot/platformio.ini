; PlatformIO Project Configuration
; HarvestShield ESP32 Firmware
;
; Para compilar: pio run
; Para upload:   pio run --target upload
; Para monitor:  pio device monitor

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Configuracoes de build
build_flags =
    -DCORE_DEBUG_LEVEL=1

; Configuracoes de upload
upload_port = /dev/cu.usbserial-0001
monitor_port = /dev/cu.usbserial-0001

; Bibliotecas necessarias (apenas nativas do ESP32)
lib_deps =
